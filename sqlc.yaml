version: "2"
sql:
  - engine: "postgresql"
    queries: "./db/sqlc/queries.sql"
    schema: "./db/migrations"
    gen:
      go:
        package: "repository"
        out: "./internal/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        rename:
          bonuses: "Bonus"
          bonuse: "Bonus"
          penalties: "Penalty"
          penaltie: "Penalty"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamp"
            go_type: "time.Time"
